<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登山 GPX 軌跡產生器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 確保地圖容器填滿剩餘空間 */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        /* 自訂控制面板的層級，確保它在地圖上方 */
        .control-panel {
            z-index: 1000;
        }
        /* 隱藏捲軸但允許滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden">

    <!-- 頂部導覽列 -->
    <header class="bg-emerald-700 text-white shadow-md p-3 sm:p-4 flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-2">
            <i class="ph ph-mountains text-2xl sm:text-3xl"></i>
            <h1 class="text-lg sm:text-xl font-bold tracking-wider hidden sm:block">GPX 軌跡手繪工具</h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <!-- 搜尋列 -->
            <div class="relative flex items-center text-slate-800">
                <input type="text" id="input-search" placeholder="搜尋地點 (例如: 玉山)" class="px-3 py-2 pr-8 rounded text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 w-40 sm:w-56 transition-all shadow-inner">
                <button id="btn-search" class="absolute right-1 text-slate-400 hover:text-emerald-600 p-1 flex items-center justify-center transition-colors">
                    <i class="ph ph-magnifying-glass text-lg"></i>
                </button>
            </div>
            
            <button id="btn-locate" class="bg-emerald-600 hover:bg-emerald-500 transition px-3 py-2 rounded flex items-center gap-1 text-sm font-medium shadow-sm">
                <i class="ph ph-crosshair text-lg"></i>
                <span class="hidden sm:inline">定位</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區：地圖與浮動控制面板 -->
    <main class="flex-1 relative w-full h-full">
        <!-- 地圖容器 -->
        <div id="map"></div>

        <!-- 浮動控制面板 -->
        <div class="control-panel absolute top-4 left-4 sm:top-6 sm:left-6 w-72 bg-white/95 backdrop-blur-sm rounded-xl shadow-xl border border-slate-200 flex flex-col overflow-hidden transition-all">
            
            <!-- 狀態資訊區 -->
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-slate-500 text-sm font-medium">總距離</span>
                    <span class="text-2xl font-bold text-emerald-700" id="stat-distance">0.00 <span class="text-sm font-normal text-slate-500">km</span></span>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-slate-500 text-sm font-medium">軌跡點數量</span>
                    <span class="text-lg font-semibold text-slate-700" id="stat-points">0 <span class="text-xs font-normal text-slate-400">點</span></span>
                </div>
            </div>

            <!-- 操作按鈕區 -->
            <div class="p-5 flex flex-col gap-3">
                <!-- 繪圖模式切換 -->
                <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-100 rounded-lg hover:bg-slate-200 transition">
                    <div class="flex items-center gap-2 text-slate-700 font-medium">
                        <i class="ph ph-pencil-simple-line text-xl"></i>
                        繪製模式
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="toggle-draw" class="sr-only" checked>
                        <div class="block bg-slate-300 w-10 h-6 rounded-full transition-colors" id="toggle-bg"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform translate-x-4" id="toggle-dot"></div>
                    </div>
                </label>
                <p class="text-xs text-slate-500 px-1 mb-2">開啟時，點擊地圖即可新增軌跡點。關閉以避免滑動時誤觸。</p>

                <!-- 編輯按鈕群 -->
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-undo" disabled class="flex items-center justify-center gap-1 py-2 px-3 bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium text-sm">
                        <i class="ph ph-arrow-u-up-left text-lg"></i>
                        上一步
                    </button>
                    <button id="btn-clear" disabled class="flex items-center justify-center gap-1 py-2 px-3 bg-white border border-red-200 text-red-600 rounded-lg hover:bg-red-50 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium text-sm">
                        <i class="ph ph-trash text-lg"></i>
                        清除
                    </button>
                </div>

                <!-- 匯出按鈕 -->
                <button id="btn-export" disabled class="mt-2 w-full flex items-center justify-center gap-2 py-3 px-4 bg-emerald-600 text-white rounded-lg hover:bg-emerald-500 disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed transition font-bold text-base shadow-sm">
                    <i class="ph ph-download-simple text-xl"></i>
                    匯出 GPX 檔案
                </button>
            </div>
        </div>

        <!-- 說明提示 (僅在沒有點時顯示) -->
        <div id="hint-box" class="control-panel absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-medium flex items-center gap-2 opacity-90 transition-opacity duration-300 pointer-events-none">
            <i class="ph ph-cursor-click"></i>
            請在地圖上點擊以開始繪製路線
        </div>
    </main>

    <!-- 全域 Toast 提示 -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-xl text-sm font-medium transition-opacity duration-300 opacity-0 pointer-events-none z-[2000] flex items-center gap-2">
        <i class="ph ph-info text-lg text-emerald-400" id="toast-icon"></i>
        <span id="toast-msg">訊息</span>
    </div>

    <!-- 清除確認 Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[2000] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="confirm-modal-box">
            <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <i class="ph ph-warning-circle text-red-500 text-xl"></i>
                清除軌跡
            </h3>
            <p class="text-slate-600 mb-6 text-sm">確定要清除所有已繪製的軌跡嗎？此動作無法復原。</p>
            <div class="flex justify-end gap-3">
                <button id="btn-cancel-clear" class="px-4 py-2 rounded-lg text-slate-600 bg-slate-100 hover:bg-slate-200 transition font-medium text-sm">取消</button>
                <button id="btn-confirm-clear" class="px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition font-medium text-sm shadow-sm">確定清除</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 狀態變數 ---
            let isDrawingMode = true;
            let routePoints = []; 
            let totalDistance = 0; 
            
            // --- Leaflet 圖層物件 ---
            let polylineLayer = null;
            let markersLayer = L.layerGroup();
            let searchMarkerLayer = null; // 用於儲存搜尋地點的標記

            // --- 1. 初始化地圖 ---
            const map = L.map('map', {
                zoomControl: false 
            }).setView([23.6978, 120.9605], 8);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            markersLayer.addTo(map);

            // --- 2. 設定底圖 (Base Layers) ---
            const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap'
            });

            const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                maxZoom: 17,
                attribution: '&copy; OpenTopoMap'
            });

            topoLayer.addTo(map);

            const baseMaps = {
                "等高線地形圖 (推薦)": topoLayer,
                "標準街道圖": osmLayer
            };
            L.control.layers(baseMaps, null, { position: 'bottomright' }).addTo(map);

            polylineLayer = L.polyline([], {
                color: '#ef4444', 
                weight: 4,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);


            // --- 3. 自訂 UI 輔助函式 (Toast & Modal) ---
            let toastTimeout;
            const showToast = (msg, type = 'info') => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-msg');
                const toastIcon = document.getElementById('toast-icon');
                
                toastMsg.textContent = msg;
                if(type === 'error') {
                    toastIcon.className = 'ph ph-warning-circle text-lg text-red-400';
                } else if(type === 'success') {
                    toastIcon.className = 'ph ph-check-circle text-lg text-emerald-400';
                } else {
                    toastIcon.className = 'ph ph-info text-lg text-blue-400';
                }

                toast.classList.remove('opacity-0');
                
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.add('opacity-0');
                }, 3000);
            };

            const confirmModal = document.getElementById('confirm-modal');
            const confirmModalBox = document.getElementById('confirm-modal-box');
            
            const openConfirmModal = () => {
                confirmModal.classList.remove('hidden');
                void confirmModal.offsetWidth; // trigger reflow
                confirmModal.classList.remove('opacity-0');
                confirmModalBox.classList.remove('scale-95');
            };

            const closeConfirmModal = () => {
                confirmModal.classList.add('opacity-0');
                confirmModalBox.classList.add('scale-95');
                setTimeout(() => {
                    confirmModal.classList.add('hidden');
                }, 300);
            };


            // --- 4. 核心邏輯與事件處理 ---
            const updateUI = () => {
                document.getElementById('stat-distance').innerHTML = `${totalDistance.toFixed(2)} <span class="text-sm font-normal text-slate-500">km</span>`;
                document.getElementById('stat-points').innerHTML = `${routePoints.length} <span class="text-xs font-normal text-slate-400">點</span>`;

                const hasPoints = routePoints.length > 0;
                document.getElementById('btn-undo').disabled = !hasPoints;
                document.getElementById('btn-clear').disabled = !hasPoints;
                document.getElementById('btn-export').disabled = routePoints.length < 2; 

                const hintBox = document.getElementById('hint-box');
                if (hasPoints) {
                    hintBox.classList.add('opacity-0');
                } else {
                    hintBox.classList.remove('opacity-0');
                }
            };

            const redrawRoute = () => {
                polylineLayer.setLatLngs(routePoints);
                markersLayer.clearLayers();
                totalDistance = 0;

                for (let i = 0; i < routePoints.length; i++) {
                    const pt = routePoints[i];
                    
                    if (i > 0) {
                        const prevPt = L.latLng(routePoints[i-1].lat, routePoints[i-1].lng);
                        const currPt = L.latLng(pt.lat, pt.lng);
                        totalDistance += (prevPt.distanceTo(currPt) / 1000); 
                    }

                    let markerOptions = {
                        radius: 4,
                        fillColor: "#ffffff",
                        color: "#ef4444",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    };

                    if (i === 0) {
                        markerOptions.fillColor = "#10b981"; 
                        markerOptions.color = "#047857"; 
                        markerOptions.radius = 6;
                        markerOptions.weight = 3;
                    } else if (i === routePoints.length - 1) {
                        markerOptions.fillColor = "#ef4444";
                        markerOptions.color = "#b91c1c";
                        markerOptions.radius = 6;
                        markerOptions.weight = 3;
                    }

                    L.circleMarker([pt.lat, pt.lng], markerOptions).addTo(markersLayer);
                }
                updateUI();
            };

            map.on('click', (e) => {
                if (!isDrawingMode) return;
                routePoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
                redrawRoute();
            });

            // --- 5. 面板按鈕與搜尋綁定 ---

            // 搜尋地點功能 (使用 OpenStreetMap Nominatim API)
            const performSearch = async () => {
                const query = document.getElementById('input-search').value.trim();
                if (!query) return;

                const btnSearch = document.getElementById('btn-search');
                btnSearch.innerHTML = '<i class="ph ph-spinner animate-spin text-lg text-emerald-500"></i>';

                try {
                    // 發送搜尋請求 (加上 limit=1 加快速度)
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await response.json();

                    if (data && data.length > 0) {
                        const result = data[0];
                        const lat = parseFloat(result.lat);
                        const lon = parseFloat(result.lon);
                        
                        // 飛到該地點
                        map.flyTo([lat, lon], 14, { duration: 1.5 });

                        // 清除舊的搜尋標記
                        if (searchMarkerLayer) {
                            map.removeLayer(searchMarkerLayer);
                        }

                        // 建立新的搜尋結果標記 (藍色)
                        searchMarkerLayer = L.circleMarker([lat, lon], {
                            radius: 8,
                            fillColor: "#3b82f6",
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map).bindPopup(`<b>搜尋結果:</b><br>${result.display_name}`).openPopup();

                    } else {
                        showToast("找不到該地點，請嘗試其他關鍵字", "error");
                    }
                } catch (error) {
                    console.error("Search error:", error);
                    showToast("搜尋發生錯誤，請檢查網路連線", "error");
                } finally {
                    btnSearch.innerHTML = '<i class="ph ph-magnifying-glass text-lg"></i>';
                }
            };

            document.getElementById('btn-search').addEventListener('click', performSearch);
            document.getElementById('input-search').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            // 切換繪製模式
            const toggleDraw = document.getElementById('toggle-draw');
            const toggleBg = document.getElementById('toggle-bg');
            const toggleDot = document.getElementById('toggle-dot');

            const updateToggleUI = () => {
                if (isDrawingMode) {
                    toggleBg.classList.replace('bg-slate-300', 'bg-emerald-500');
                    toggleDot.classList.add('translate-x-4');
                    toggleDot.classList.remove('translate-x-0');
                    map.getContainer().style.cursor = 'crosshair';
                } else {
                    toggleBg.classList.replace('bg-emerald-500', 'bg-slate-300');
                    toggleDot.classList.remove('translate-x-4');
                    toggleDot.classList.add('translate-x-0');
                    map.getContainer().style.cursor = ''; 
                }
            };

            toggleDraw.checked = isDrawingMode;
            updateToggleUI();

            toggleDraw.addEventListener('change', (e) => {
                isDrawingMode = e.target.checked;
                updateToggleUI();
            });

            // 上一步
            document.getElementById('btn-undo').addEventListener('click', () => {
                if (routePoints.length > 0) {
                    routePoints.pop();
                    redrawRoute();
                }
            });

            // 清除全部
            document.getElementById('btn-clear').addEventListener('click', () => {
                if(routePoints.length === 0) return;
                openConfirmModal(); // 打開自訂對話框
            });
            document.getElementById('btn-cancel-clear').addEventListener('click', closeConfirmModal);
            document.getElementById('btn-confirm-clear').addEventListener('click', () => {
                routePoints = [];
                redrawRoute();
                closeConfirmModal();
                showToast("軌跡已清除", "success");
            });

            // 定位目前位置
            document.getElementById('btn-locate').addEventListener('click', () => {
                showToast("正在取得您的位置...");
                map.locate({setView: true, maxZoom: 14});
            });

            map.on('locationfound', (e) => {
                if (searchMarkerLayer) map.removeLayer(searchMarkerLayer);
                
                searchMarkerLayer = L.circleMarker(e.latlng, {
                    radius: 8,
                    fillColor: "#3b82f6", 
                    color: "#ffffff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup("您目前的位置").openPopup();
                
                showToast("已成功定位", "success");
            });

            map.on('locationerror', (e) => {
                console.error(e.message);
                showToast("無法取得您的位置，請確認瀏覽器定位權限是否開啟。", "error"); 
            });


            // --- 6. GPX 匯出功能 ---
            document.getElementById('btn-export').addEventListener('click', () => {
                if (routePoints.length < 2) return;

                let gpxData = `<?xml version="1.0" encoding="UTF-8"?>\n`;
                gpxData += `<gpx version="1.1" creator="Hiking GPX Maker" xmlns="http://www.topografix.com/GPX/1/1">\n`;
                gpxData += `  <metadata>\n`;
                gpxData += `    <name>自訂登山路線</name>\n`;
                gpxData += `    <desc>透過網頁手繪產生的 GPX 軌跡</desc>\n`;
                gpxData += `    <time>${new Date().toISOString()}</time>\n`;
                gpxData += `  </metadata>\n`;
                gpxData += `  <trk>\n`;
                gpxData += `    <name>Route_${new Date().getTime()}</name>\n`;
                gpxData += `    <trkseg>\n`;

                routePoints.forEach(pt => {
                    gpxData += `      <trkpt lat="${pt.lat}" lon="${pt.lng}">\n`;
                    gpxData += `      </trkpt>\n`;
                });

                gpxData += `    </trkseg>\n`;
                gpxData += `  </trk>\n`;
                gpxData += `</gpx>`;

                const blob = new Blob([gpxData], { type: 'application/gpx+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                a.href = url;
                a.download = `HikeRoute_${dateStr}.gpx`;
                
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast("GPX 檔案已成功下載！", "success");
                }, 0);
            });

            updateUI();
        });
    </script>
</body>
</html>
