<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登山 GPX 軌跡產生器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 確保地圖容器填滿剩餘空間 */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        /* 自訂控制面板的層級，確保它在地圖上方 */
        .control-panel {
            z-index: 1000;
        }
        /* 隱藏捲軸但允許滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden">

    <!-- 頂部導覽列 -->
    <header class="bg-emerald-700 text-white shadow-md p-4 flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-2">
            <i class="ph ph-mountains text-3xl"></i>
            <h1 class="text-xl font-bold tracking-wider">GPX 軌跡手繪工具</h1>
        </div>
        <div class="flex gap-3">
            <button id="btn-locate" class="bg-emerald-600 hover:bg-emerald-500 transition px-3 py-2 rounded flex items-center gap-1 text-sm font-medium">
                <i class="ph ph-crosshair text-lg"></i>
                <span class="hidden sm:inline">定位我的位置</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區：地圖與浮動控制面板 -->
    <main class="flex-1 relative w-full h-full">
        <!-- 地圖容器 -->
        <div id="map"></div>

        <!-- 浮動控制面板 -->
        <div class="control-panel absolute top-4 left-4 sm:top-6 sm:left-6 w-72 bg-white/95 backdrop-blur-sm rounded-xl shadow-xl border border-slate-200 flex flex-col overflow-hidden transition-all">
            
            <!-- 狀態資訊區 -->
            <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-slate-500 text-sm font-medium">總距離</span>
                    <span class="text-2xl font-bold text-emerald-700" id="stat-distance">0.00 <span class="text-sm font-normal text-slate-500">km</span></span>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-slate-500 text-sm font-medium">軌跡點數量</span>
                    <span class="text-lg font-semibold text-slate-700" id="stat-points">0 <span class="text-xs font-normal text-slate-400">點</span></span>
                </div>
            </div>

            <!-- 操作按鈕區 -->
            <div class="p-5 flex flex-col gap-3">
                <!-- 繪圖模式切換 -->
                <label class="flex items-center justify-between cursor-pointer p-3 bg-slate-100 rounded-lg hover:bg-slate-200 transition">
                    <div class="flex items-center gap-2 text-slate-700 font-medium">
                        <i class="ph ph-pencil-simple-line text-xl"></i>
                        繪製模式
                    </div>
                    <div class="relative">
                        <input type="checkbox" id="toggle-draw" class="sr-only" checked>
                        <div class="block bg-slate-300 w-10 h-6 rounded-full transition-colors" id="toggle-bg"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform translate-x-4" id="toggle-dot"></div>
                    </div>
                </label>
                <p class="text-xs text-slate-500 px-1 mb-2">開啟時，點擊地圖即可新增軌跡點。關閉以避免滑動時誤觸。</p>

                <!-- 編輯按鈕群 -->
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-undo" disabled class="flex items-center justify-center gap-1 py-2 px-3 bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium text-sm">
                        <i class="ph ph-arrow-u-up-left text-lg"></i>
                        上一步
                    </button>
                    <button id="btn-clear" disabled class="flex items-center justify-center gap-1 py-2 px-3 bg-white border border-red-200 text-red-600 rounded-lg hover:bg-red-50 disabled:opacity-50 disabled:cursor-not-allowed transition font-medium text-sm">
                        <i class="ph ph-trash text-lg"></i>
                        清除
                    </button>
                </div>

                <!-- 匯出按鈕 -->
                <button id="btn-export" disabled class="mt-2 w-full flex items-center justify-center gap-2 py-3 px-4 bg-emerald-600 text-white rounded-lg hover:bg-emerald-500 disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed transition font-bold text-base shadow-sm">
                    <i class="ph ph-download-simple text-xl"></i>
                    匯出 GPX 檔案
                </button>
            </div>
        </div>

        <!-- 說明提示 (僅在沒有點時顯示) -->
        <div id="hint-box" class="control-panel absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-sm font-medium flex items-center gap-2 opacity-90 transition-opacity duration-300 pointer-events-none">
            <i class="ph ph-cursor-click"></i>
            請在地圖上點擊以開始繪製路線
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 狀態變數 ---
            let isDrawingMode = true;
            let routePoints = []; // 儲存 {lat, lng} 的陣列
            let totalDistance = 0; // 單位：公里
            
            // --- Leaflet 圖層物件 ---
            let polylineLayer = null;
            let markersLayer = L.layerGroup();

            // --- 1. 初始化地圖 ---
            // 預設中心點設為台灣中心 (南投附近)
            const map = L.map('map', {
                zoomControl: false // 隱藏預設，稍後改放到右下角
            }).setView([23.6978, 120.9605], 8);

            L.control.zoom({
                position: 'bottomright'
            }).addTo(map);

            markersLayer.addTo(map);

            // --- 2. 設定底圖 (Base Layers) ---
            // 一般地圖 (OpenStreetMap)
            const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            });

            // 等高線地形圖 (OpenTopoMap) - 登山推薦
            const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                maxZoom: 17,
                attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
            });

            // 預設使用等高線地形圖
            topoLayer.addTo(map);

            // 加入圖層切換控制
            const baseMaps = {
                "等高線地形圖 (推薦)": topoLayer,
                "標準街道圖": osmLayer
            };
            L.control.layers(baseMaps, null, { position: 'bottomright' }).addTo(map);

            // 初始化折線 (Polyline)
            polylineLayer = L.polyline([], {
                color: '#ef4444', // Tailwind red-500
                weight: 4,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);


            // --- 3. 核心邏輯與事件處理 ---

            // 更新 UI 狀態
            const updateUI = () => {
                // 更新數字
                document.getElementById('stat-distance').innerHTML = `${totalDistance.toFixed(2)} <span class="text-sm font-normal text-slate-500">km</span>`;
                document.getElementById('stat-points').innerHTML = `${routePoints.length} <span class="text-xs font-normal text-slate-400">點</span>`;

                // 更新按鈕狀態
                const hasPoints = routePoints.length > 0;
                document.getElementById('btn-undo').disabled = !hasPoints;
                document.getElementById('btn-clear').disabled = !hasPoints;
                document.getElementById('btn-export').disabled = routePoints.length < 2; // 至少兩點才能匯出合理的軌跡

                // 更新提示訊息
                const hintBox = document.getElementById('hint-box');
                if (hasPoints) {
                    hintBox.classList.add('opacity-0');
                } else {
                    hintBox.classList.remove('opacity-0');
                }
            };

            // 重新計算總距離並重繪圖層
            const redrawRoute = () => {
                // 1. 更新折線
                polylineLayer.setLatLngs(routePoints);

                // 2. 更新圓點標記 (僅保留起點、終點和中途小點)
                markersLayer.clearLayers();
                totalDistance = 0;

                for (let i = 0; i < routePoints.length; i++) {
                    const pt = routePoints[i];
                    
                    // 計算距離
                    if (i > 0) {
                        const prevPt = L.latLng(routePoints[i-1].lat, routePoints[i-1].lng);
                        const currPt = L.latLng(pt.lat, pt.lng);
                        totalDistance += (prevPt.distanceTo(currPt) / 1000); // Leaflet 回傳公尺，轉公里
                    }

                    // 繪製標記
                    let markerOptions = {
                        radius: 4,
                        fillColor: "#ffffff",
                        color: "#ef4444",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    };

                    // 起點特製樣式 (綠色)
                    if (i === 0) {
                        markerOptions.fillColor = "#10b981"; // emerald-500
                        markerOptions.color = "#047857"; // emerald-700
                        markerOptions.radius = 6;
                        markerOptions.weight = 3;
                    } 
                    // 終點特製樣式 (紅色，若點數 > 1)
                    else if (i === routePoints.length - 1) {
                        markerOptions.fillColor = "#ef4444";
                        markerOptions.color = "#b91c1c";
                        markerOptions.radius = 6;
                        markerOptions.weight = 3;
                    }

                    L.circleMarker([pt.lat, pt.lng], markerOptions).addTo(markersLayer);
                }

                updateUI();
            };

            // 地圖點擊事件：新增軌跡點
            map.on('click', (e) => {
                if (!isDrawingMode) return;
                
                routePoints.push({ lat: e.latlng.lat, lng: e.latlng.lng });
                redrawRoute();
            });

            // --- 4. 面板按鈕綁定 ---

            // 切換繪製模式
            const toggleDraw = document.getElementById('toggle-draw');
            const toggleBg = document.getElementById('toggle-bg');
            const toggleDot = document.getElementById('toggle-dot');

            const updateToggleUI = () => {
                if (isDrawingMode) {
                    toggleBg.classList.replace('bg-slate-300', 'bg-emerald-500');
                    toggleDot.classList.add('translate-x-4');
                    toggleDot.classList.remove('translate-x-0');
                    map.getContainer().style.cursor = 'crosshair';
                } else {
                    toggleBg.classList.replace('bg-emerald-500', 'bg-slate-300');
                    toggleDot.classList.remove('translate-x-4');
                    toggleDot.classList.add('translate-x-0');
                    map.getContainer().style.cursor = ''; // 恢復預設（抓取）
                }
            };

            // 初始化 toggle 樣式
            toggleDraw.checked = isDrawingMode;
            updateToggleUI();

            toggleDraw.addEventListener('change', (e) => {
                isDrawingMode = e.target.checked;
                updateToggleUI();
            });

            // 上一步
            document.getElementById('btn-undo').addEventListener('click', () => {
                if (routePoints.length > 0) {
                    routePoints.pop();
                    redrawRoute();
                }
            });

            // 清除全部
            document.getElementById('btn-clear').addEventListener('click', () => {
                // 簡單的自訂彈窗代替 alert/confirm
                if(routePoints.length === 0) return;
                
                const confirmClear = confirm("確定要清除所有已繪製的軌跡嗎？");
                if (confirmClear) {
                    routePoints = [];
                    redrawRoute();
                }
            });

            // 定位目前位置
            document.getElementById('btn-locate').addEventListener('click', () => {
                map.locate({setView: true, maxZoom: 14});
            });

            map.on('locationfound', (e) => {
                // 定位成功時，可以選擇加上一個標記
                L.circleMarker(e.latlng, {
                    radius: 8,
                    fillColor: "#3b82f6", // blue-500
                    color: "#ffffff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup("您目前的位置").openPopup();
            });

            map.on('locationerror', (e) => {
                console.error(e.message);
                alert("無法取得您的位置，請確認瀏覽器定位權限是否開啟。"); // 因為在 iframe 內，定位有時會受限
            });


            // --- 5. GPX 匯出功能 ---
            document.getElementById('btn-export').addEventListener('click', () => {
                if (routePoints.length < 2) return;

                // 產生 GPX XML 字串
                let gpxData = `<?xml version="1.0" encoding="UTF-8"?>\n`;
                gpxData += `<gpx version="1.1" creator="Hiking GPX Maker" xmlns="http://www.topografix.com/GPX/1/1">\n`;
                gpxData += `  <metadata>\n`;
                gpxData += `    <name>自訂登山路線</name>\n`;
                gpxData += `    <desc>透過網頁手繪產生的 GPX 軌跡</desc>\n`;
                gpxData += `    <time>${new Date().toISOString()}</time>\n`;
                gpxData += `  </metadata>\n`;
                gpxData += `  <trk>\n`;
                gpxData += `    <name>Route_${new Date().getTime()}</name>\n`;
                gpxData += `    <trkseg>\n`;

                routePoints.forEach(pt => {
                    // 基本的 GPX 只需要 lat 和 lon
                    // 注意：如果是手繪，通常沒有海拔(ele)與時間(time)資訊。導航軟體依然可讀取作為路線參考(Route/Track)。
                    gpxData += `      <trkpt lat="${pt.lat}" lon="${pt.lng}">\n`;
                    gpxData += `      </trkpt>\n`;
                });

                gpxData += `    </trkseg>\n`;
                gpxData += `  </trk>\n`;
                gpxData += `</gpx>`;

                // 建立 Blob 並觸發下載
                const blob = new Blob([gpxData], { type: 'application/gpx+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                // 檔名加上當前日期時間
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                a.href = url;
                a.download = `HikeRoute_${dateStr}.gpx`;
                
                document.body.appendChild(a);
                a.click();
                
                // 清理
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 0);
            });

            // 初始化時更新一次 UI
            updateUI();
        });
    </script>
</body>
</html>
